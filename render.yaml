# Render Blueprint — Keep Playing
# https://render.com/docs/blueprint-spec
#
# One web service (Next.js standalone) + managed Postgres.
# R2, Resend, OpenAI keys are added in the Render dashboard as secrets.

services:
  - type: web
    name: keep-playing-web
    runtime: node
    plan: starter
    region: frankfurt # Closest Render region to Accra
    # npm-installed pnpm, not corepack — corepack's bundled signature keys
    # go stale when npm rotates signing keys ("Cannot find matching keyid").
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm turbo build --filter=@keep-playing/web
    startCommand: pnpm --filter @keep-playing/web start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: keep-playing-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: keep-playing-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://app.keepplaying.studio
      # Set in dashboard (secrets):
      # R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_URL
      # OPENAI_API_KEY, RESEND_API_KEY, EMAIL_FROM
      # WHATSAPP_* (optional)
      # SENTRY_DSN (optional)

databases:
  - name: keep-playing-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: '16'
